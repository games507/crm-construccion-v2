📘 MANUAL DEL SISTEMA – VERTICESOFT (CRM CONSTRUCCIÓN)
🧩 DESCRIPCIÓN GENERAL

VerticeSoft es un sistema de gestión empresarial orientado a:

Control de proyectos
Gestión de costos
Control financiero (cuentas por pagar)
Multiempresa (cada empresa con su propio entorno)
🏢 MÓDULO: EMPRESAS (MULTIEMPRESA)
✔ Funcionalidad
Crear empresas (SuperAdmin)
Asignar usuarios a empresas
Cada empresa maneja su propia información
🖼️ LOGO DE EMPRESA
Cada empresa puede subir su logo
El logo se guarda en:
/public/storage/empresas/{id}/logo.png
✔ Características
Reemplaza automáticamente el logo anterior
No requiere configuración adicional en servidor
Compatible con cPanel (sin SSH)
👤 MÓDULO: MI EMPRESA
✔ Funcionalidad
Editar datos de la empresa:
Nombre
RUC / DV
Contacto
Teléfono
Email
Dirección
Logo
🔄 Comportamiento del logo
Si se sube uno nuevo → reemplaza el anterior
Se guarda automáticamente en carpeta pública
Disponible inmediatamente en el sistema
📁 MÓDULO: PROYECTOS
✔ Funcionalidad
Crear proyectos
Asociar costos
Seguimiento de ejecución
💰 MÓDULO: COSTOS
✔ Funcionalidad

Registro de costos por proyecto:

Tipo
Categoría
Descripción
Monto
Proveedor
Estado de pago
🔁 AUTOMATIZACIÓN (CLAVE DEL SISTEMA)

Cuando se registra un costo:

Estado del costo	Acción automática
Pendiente	Se crea cuenta por pagar
Parcial	Se crea cuenta por pagar
Pagado	NO se crea cuenta

👉 Esto elimina trabajo manual.

